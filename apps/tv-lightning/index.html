<!doctype html>
<html lang="en-US" dir="ltr">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewporting
         width=device-width ensures the layout matches the device width
         initial-scale=1.0 sets the default zoom level
         viewport-fit=cover allows the PWA to use the entire screen on devices with display cutouts
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <style>
      /* Reset default padding and margin so layout is consistent across browsers */
      * {
        padding: 0;
        margin: 0;
      }

      /* Stretch the app container to fill the viewport and keep the background black */
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000000;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- App will attach to this div -->
    <div id="app"></div>

    <!-- Vite entry point -->
    <script type="module" src="src/index.ts"></script>
  </body>
</html>
