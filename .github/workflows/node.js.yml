name: Node.js CI

on: [push, pull_request]

jobs:
  build:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            node-version: 24
          - os: ubuntu-24.04
            node-version: 25

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Restore workspace dependencies
        id: cache-modules
        uses: actions/cache@v5
        with:
          path: |
            apps/mobile-expo/node_modules
            apps/tv-lightning/node_modules
            apps/web-vite/node_modules
            node_modules
            packages/core/node_modules
            packages/media/node_modules
            packages/player-core/node_modules
            packages/vfs/node_modules
          key: cache-pnpm-modules-${{ matrix.os }}-${{ matrix.node-version }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: |
          npm install -g pnpm

      - name: pnpm install --frozen-lockfile
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: |
          pnpm install --frozen-lockfile

      - name: Run dependency audit
        run: |
          pnpm audit-ci

      - name: Run lint:prettier
        run: |
          pnpm lint:prettier

      - name: Run lint:eslint
        run: |
          pnpm lint:eslint

      - name: Run build:tsc
        run: |
          pnpm build:tsc

      - name: Run build:tv
        run: |
          pnpm build:tv

      - name: Run build:mobile
        run: |
          pnpm build:mobile

      - name: Run build:web
        run: |
          pnpm build:web

      - name: Run workspace tests
        run: |
          pnpm test
